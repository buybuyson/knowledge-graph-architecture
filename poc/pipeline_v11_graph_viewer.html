<html lang="vi">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Pipeline V11 — Knowledge Graphs</title>

<style>
  :root{
    --bg:#0f1117; --panel:#171a23; --line:#2a2f3d; --txt:#e6e8ee; --mut:#8b91a3;
    --blue:#378ADD; --purple:#7F77DD; --teal:#1D9E75; --amber:#EF9F27;
    --coral:#D85A30; --gray:#888780; --pink:#D4537E; --green:#639922;
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--txt);
       font-family:"DejaVu Sans","Segoe UI",sans-serif;overflow:hidden}
  header{padding:14px 20px;border-bottom:1px solid var(--line);
         display:flex;align-items:center;gap:16px;flex-wrap:wrap}
  h1{font-size:16px;font-weight:600;margin:0;letter-spacing:.3px}
  .tabs{display:flex;gap:6px}
  .tab{padding:7px 14px;border:1px solid var(--line);background:var(--panel);
       color:var(--mut);border-radius:8px;cursor:pointer;font-size:13px;transition:.15s}
  .tab:hover{color:var(--txt);border-color:#3a4156}
  .tab.active{background:var(--blue);color:#fff;border-color:var(--blue)}
  .spacer{flex:1}
  .btn{padding:7px 14px;border:1px solid var(--line);background:var(--panel);
       color:var(--txt);border-radius:8px;cursor:pointer;font-size:13px}
  .btn:hover{border-color:var(--blue)}
  .wrap{display:flex;height:calc(100vh - 56px)}
  svg{flex:1;cursor:grab}
  svg:active{cursor:grabbing}
  aside{width:320px;border-left:1px solid var(--line);padding:16px;overflow-y:auto;
        background:var(--panel)}
  aside h2{font-size:13px;text-transform:uppercase;letter-spacing:.6px;color:var(--mut);
           margin:0 0 8px}
  .meta{font-size:13px;line-height:1.7}
  .meta b{color:var(--txt)} .meta span{color:var(--mut)}
  .chip{display:inline-block;padding:2px 8px;border-radius:6px;font-size:11px;
        margin:2px 4px 2px 0;background:#222633;color:var(--mut)}
  .legend{margin-top:14px;font-size:12px;line-height:1.9}
  .dot{display:inline-block;width:10px;height:10px;border-radius:3px;margin-right:6px;
       vertical-align:middle}
  .ev{font-family:"DejaVu Sans Mono",monospace;font-size:11px;color:var(--amber)}
  .hint{font-size:12px;color:var(--mut);margin-top:6px;line-height:1.6}
  .rank{font-size:12px;line-height:1.9}
  .rank b{color:var(--amber)}
  text{font-family:"DejaVu Sans",sans-serif}
  .edge-lbl{font-size:9px;fill:var(--mut)}
</style>
</head>

ge_index": [{"seq": 1, "dir": "d:raw -> d:validated", "route": "reads", "answer_in": "d:validated", "op": "audio.inspect()", "evidence": "main.py:271"}, {"seq": 2, "dir": "d:validated -> d:denoised", "route": "replaces", "answer_in": "d:denoised", "op": "denoise.run()", "evidence": "main.py:282"}, {"seq": 3, "dir": "d:denoised -> d:chunkwav", "route": "derives", "answer_in": "d:chunkwav", "op": "_extract_chunk()", "evidence": "main.py:298"}, {"seq": 4, "dir": "d:chunkwav -> d:segs_raw", "route": "derives", "answer_in": "d:segs_raw", "op": "transcribe.run()", "evidence": "main.py:304"}, {"seq": 5, "dir": "d:segs_raw -> d:segs_shift", "route": "edits", "answer_in": "d:segs_shift", "op": "seg.start += start", "evidence": "main.py:322"}, {"seq": 6, "dir": "d:segs_shift -> d:segs_llm", "route": "edits", "answer_in": "d:segs_llm", "op": "postprocess.run()", "evidence": "main.py:327"}, {"seq": 7, "dir": "d:segs_llm -> d:segs_spk", "route": "annotates", "answer_in": "d:segs_spk", "op": "diarize.run()", "evidence": "main.py:336"}, {"seq": 8, "dir": "d:segs_spk -> d:part", "route": "emits", "answer_in": "d:part", "op": "export_chunk()", "evidence": "main.py:344"}, {"seq": 9, "dir": "d:part -> d:final", "route": "emits", "answer_in": "d:final", "op": "export_final()", "evidence": "main.py:364"}], "design": {"edge_role": "a path to the answer, NOT the answer", "node_role": "where the answer is held (data characteristics in node.props)", "edge_index_role": "summary table for a query to look up quickly by seq, avoiding opening each node", "route_vocab": ["reads", "replaces", "derives", "edits", "annotates", "emits"], "route_note": "route is only for routing/filtering branches; to know how data changes, enter node.answer_in"}}, "domain_concept": {"schema": {"node_types": ["Concept"], "edge_types": ["semantic (decides/reduces/edits/increases/...)"]}, "nodes": [{"id": "c:stt", "type": "Concept", "label": "Speech-to-text"}, {"id": "c:vad", "type": "Concept", "label": "VAD (silence filtering)"}, {"id": "c:chunk", "type": "Concept", "label": "Chunking"}, {"id": "c:silence", "type": "Concept", "label": "Silence detection"}, {"id": "c:halluc", "type": "Concept", "label": "Hallucination"}, {"id": "c:llm", "type": "Concept", "label": "LLM post-process"}, {"id": "c:diar", "type": "Concept", "label": "Diarization"}, {"id": "c:engine", "type": "Concept", "label": "ASR/denoise engine"}, {"id": "c:hwmode", "type": "Concept", "label": "Hardware mode"}, {"id": "c:denoise", "type": "Concept", "label": "Denoise"}, {"id": "c:speaker", "type": "Concept", "label": "Speaker labels"}, {"id": "c:quality", "type": "Concept", "label": "Transcript quality"}], "edges": [{"source": "c:hwmode", "target": "c:engine", "type": "semantic", "relation": "decides"}, {"source": "c:engine", "target": "c:stt", "type": "semantic", "relation": "provides"}, {"source": "c:vad", "target": "c:silence", "type": "semantic", "relation": "based on"}, {"source": "c:chunk", "target": "c:silence", "type": "semantic", "relation": "cuts at"}, {"source": "c:chunk", "target": "c:halluc", "type": "semantic", "relation": "reduces"}, {"source": "c:vad", "target": "c:halluc", "type": "semantic", "relation": "reduces"}, {"source": "c:denoise", "target": "c:quality", "type": "semantic", "relation": "increases"}, {"source": "c:stt", "target": "c:halluc", "type": "semantic", "relation": "produces"}, {"source": "c:llm", "target": "c:halluc", "type": "semantic", "relation": "fixes"}, {"source": "c:llm", "target": "c:quality", "type": "semantic", "relation": "increases"}, {"source": "c:diar", "target": "c:speaker", "type": "semantic", "relation": "assigns"}, {"source": "c:stt", "target": "c:quality", "type": "semantic", "relation": "affects"}]}};
const COLORS = {Module:"#378ADD",Function:"#7F77DD",ConfigVar:"#EF9F27",Model:"#1D9E75",
                DataState:"#1D9E75",Concept:"#D4537E"};
const G = window.GRAPHS;
const KEYS = Object.keys(G);
const LABELS = {code_dependency:"Code dependency",data_flow:"Data flow",domain_concept:"Domain concept"};
let cur = KEYS[0];

const svg = d3.select("#svg");
let W=window.innerWidth-320, H=window.innerHeight-56;
svg.attr("viewBox",[0,0,W,H]);
const root = svg.append("g");
svg.call(d3.zoom().scaleExtent([0.3,3]).on("zoom",e=>root.attr("transform",e.transform)));

svg.append("defs").append("marker").attr("id","arr").attr("viewBox","0 0 10 10")
  .attr("refX",22).attr("refY",5).attr("markerWidth",6).attr("markerHeight",6)
  .attr("orient","auto").append("path").attr("d","M0 0L10 5L0 10")
  .attr("fill","#4a5068");

const tabs = d3.select("#tabs");
KEYS.forEach(k=>tabs.append("div").attr("class","tab"+(k===cur?" active":""))
  .text(LABELS[k]).on("click",()=>{cur=k;d3.selectAll(".tab").classed("active",false);
  d3.select(event.target).classed("active",true);draw();}));

let sim;
function draw(){
  root.selectAll("*").remove();
  const g = G[cur];
  const nodes = g.nodes.map(d=>Object.assign({},d));
  const edges = g.edges.map(d=>Object.assign({},d));

  sim = d3.forceSimulation(nodes)
    .force("link",d3.forceLink(edges).id(d=>d.id).distance(110))
    .force("charge",d3.forceManyBody().strength(-380))
    .force("center",d3.forceCenter(W/2,H/2))
    .force("collide",d3.forceCollide(34));

  const ROUTE_COLOR={reads:"#888780",replaces:"#D85A30",derives:"#378ADD",edits:"#EF9F27",annotates:"#7F77DD",emits:"#1D9E75"};
  const link = root.append("g").selectAll("line").data(edges).join("line")
    .attr("stroke",d=>ROUTE_COLOR[d.route]||"#3a4156").attr("stroke-width",1.8).attr("marker-end","url(#arr)")
    .style("cursor","pointer")
    .on("click",(e,d)=>showEdge(d));

  const elabel = root.append("g").selectAll("text").data(edges).join("text")
    .attr("class","edge-lbl").attr("text-anchor","middle")
    .text(d=>d.type==="reads-env"?"":(d.seq?("#"+d.seq+" · "+d.route):(d.relation||d.op||d.via||d.type)));

  const node = root.append("g").selectAll("g").data(nodes).join("g")
    .style("cursor","pointer").call(drag())
    .on("click",(e,d)=>showNode(d,edges));
  node.append("circle").attr("r",16)
    .attr("fill",d=>COLORS[d.type]||"#888").attr("stroke","#0f1117").attr("stroke-width",2);
  node.append("text").attr("dy",30).attr("text-anchor","middle")
    .attr("fill","#e6e8ee").attr("font-size",11).text(d=>d.label);

  sim.on("tick",()=>{
    link.attr("x1",d=>d.source.x).attr("y1",d=>d.source.y)
        .attr("x2",d=>d.target.x).attr("y2",d=>d.target.y);
    elabel.attr("x",d=>(d.source.x+d.target.x)/2).attr("y",d=>(d.source.y+d.target.y)/2-3);
    node.attr("transform",d=>`translate(${d.x},${d.y})`);
  });

  buildLegend(g);
  buildRanks(g);
}
function drag(){
  return d3.drag()
    .on("start",(e,d)=>{if(!e.active)sim.alphaTarget(.3).restart();d.fx=d.x;d.fy=d.y;})
    .on("drag",(e,d)=>{d.fx=e.x;d.fy=e.y;})
    .on("end",(e,d)=>{if(!e.active)sim.alphaTarget(0);d.fx=null;d.fy=null;});
}
function showNode(d,edges){
  const ins=edges.filter(e=>(e.target.id||e.target)===d.id).length;
  const outs=edges.filter(e=>(e.source.id||e.source)===d.id).length;
  let props="";
  if(d.props){
    props="<br><span>— data characteristics (the answer is here) —</span>";
    for(const k in d.props){
      props+=`<br><span>${k}:</span> ${typeof d.props[k]==='object'?JSON.stringify(d.props[k]):d.props[k]}`;
    }
  }
  document.getElementById("info").innerHTML=
    `<b>${d.label}</b><br><span>type:</span> ${d.type}${d.kind?(" · "+d.kind):""}<br>
     <span>in-degree:</span> ${ins} · <span>out-degree:</span> ${outs}<br>
     <span>id:</span> <span class="ev">${d.id}</span>${props}`;
}
function showEdge(d){
  const s=d.source.label||d.source, t=d.target.label||d.target;
  const tid=d.target.id||d.target;
  let extra="";
  if(d.seq) extra+=`<br><span>seq:</span> #${d.seq}`;
  if(d.route) extra+=`<br><span>route:</span> ${d.route}`;
  if(d.op) extra+=`<br><span>op:</span> ${d.op}`;
  if(d.evidence) extra+=`<br><span>evidence:</span> <span class="ev">${d.evidence}</span>`;
  if(d.relation) extra+=`<br><span>relation:</span> ${d.relation}`;
  if(d.via) extra+=`<br><span>via function:</span> <span class="ev">${d.via}()</span>`;
  if(d.seq) extra+=`<br><span class="hint">The edge is a path, not the answer. The answer is in the target node: <span class="ev">${tid}</span></span>`;
  document.getElementById("info").innerHTML=
    `<b>${s} → ${t}</b><br><span>loại cạnh:</span> ${d.type}${extra}`;
}
function buildLegend(g){
  const types=[...new Set(g.nodes.map(n=>n.type))];
  let routeLegend="";
  if(cur==="data_flow"){
    const RC={reads:"#888780",replaces:"#D85A30",derives:"#378ADD",edits:"#EF9F27",annotates:"#7F77DD",emits:"#1D9E75"};
    routeLegend="<h2 style='margin-top:14px'>Route (edge color)</h2>"+
      Object.entries(RC).map(([r,c])=>`<div><span class="dot" style="background:${c}"></span>${r}</div>`).join("");
  }
  document.getElementById("legend").innerHTML="<h2>Node types</h2>"+
    types.map(t=>`<div><span class="dot" style="background:${COLORS[t]||'#888'}"></span>${t}</div>`).join("")+
    routeLegend+
    `<div class="hint">Edges: ${g.schema.edge_types.join(" · ")}</div>`;
}
function buildRanks(g){
  if(cur==="data_flow" && g.edge_index){
    const rows=g.edge_index.map(r=>
      `<div class="rank"><b>#${r.seq}</b> · ${r.route} · <span class="ev">${r.answer_in}</span></div>`).join("");
    document.getElementById("ranks").innerHTML=
      "<h2 style='margin-top:18px'>Edge summary table</h2>"+
      "<div class='hint'>A query reads this table first: filter by route, then enter the 'answer_in' node for the answer — not open every node.</div>"+rows;
    return;
  }
  if(cur!=="code_dependency"){document.getElementById("ranks").innerHTML="";return;}
  const indeg={};
  g.edges.forEach(e=>{const t=e.target.id||e.target;indeg[t]=(indeg[t]||0)+1;});
  const top=Object.entries(indeg).sort((a,b)=>b[1]-a[1]).slice(0,6);
  const lbl=id=>(g.nodes.find(n=>n.id===id)||{}).label||id;
  document.getElementById("ranks").innerHTML="<h2 style='margin-top:18px'>Hub (in-degree cao)</h2>"+
    "<div class='hint'>The most depended-upon module — editing it risks wide propagation.</div>"+
    top.map(([id,c])=>`<div class="rank"><b>${c}</b> · ${lbl(id)}</div>`).join("");
}
function dl(){
  const blob=new Blob([JSON.stringify(window.GRAPHS,null,2)],{type:"application/json"});
  const a=document.createElement("a");a.href=URL.createObjectURL(blob);
  a.download="pipeline_v11_graphs.json";a.click();
}
window.addEventListener("resize",()=>{W=window.innerWidth-320;H=window.innerHeight-56;
  svg.attr("viewBox",[0,0,W,H]);if(sim){sim.force("center",d3.forceCenter(W/2,H/2));sim.alpha(.3).restart();}});
draw();
</script>
</body>
</html>
